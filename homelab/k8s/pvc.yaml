  name: vimes-state
  namespace: agents-shared
  labels:
    app.kubernetes.io/name: vimes
    app.kubernetes.io/component: state
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-single
  resources:
    requests:
      storage: 10Gi
