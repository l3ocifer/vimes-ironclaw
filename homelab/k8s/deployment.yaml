---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vimes
  namespace: agents-shared
  labels:
    app.kubernetes.io/name: vimes
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: agents
spec:
  replicas: 1
  strategy:
    type: Recreate                    # state PVC is RWO
  selector:
    matchLabels:
      app.kubernetes.io/name: vimes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vimes
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: vimes-ops
      restartPolicy: Always
      affinity:
        nodeAffinity:
          # Vimes is intentionally NOT pinned. Watching the watchers
          # means he can move when needed and wakes up wherever the
          # cluster has room. Slight pull to thebeast for RAM.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - { key: kubernetes.io/hostname, operator: In, values: [thebeast] }
            - weight: 30
              preference:
                matchExpressions:
                  - { key: kubernetes.io/hostname, operator: In, values: [alef] }
      securityContext:
        runAsNonRoot: false
        fsGroup: 0
      initContainers:
        # Ensure the deliverable dir exists and is owned by the agent uid.
        # IronClaw's write_file tool resolves relative paths (the orchestrator
        # dispatches workspace-relative `world/<file>.md`) against the process
        # cwd — set to /data/graphs/vimes/pages below — so this dir must exist
        # at boot or the container's workingDir would be invalid. Runs as uid
        # 1000 (image USER `ironclaw`) so files the agent writes are owned by it.
        - name: seed-graph-dir
          image: busybox:1.37
          securityContext: { runAsUser: 1000, runAsGroup: 0 }
          command: ["sh", "-c", "mkdir -p /data/graphs/vimes/pages/world"]
          volumeMounts:
            - { name: graph-vimes, mountPath: /data/graphs/vimes }
      containers:
        - name: ironclaw
          image: git.leopaska.xyz/leo/vimes-ironclaw:homelab
          imagePullPolicy: Always
          command: ["ironclaw"]
          args: ["--no-onboard", "run"]
          # Root the process cwd at the Logseq graph's pages dir so the
          # agent's filesystem write tool persists workspace-relative
          # deliverables (e.g. `world/threats.md`) into the RWX graph the
          # mission-orchestrator verifies. Without this, relative writes
          # landed in the ephemeral /home/ironclaw and missions never closed.
          workingDir: /data/graphs/vimes/pages
          ports:
            - { name: gateway, containerPort: 3000, protocol: TCP }
            - { name: metrics, containerPort: 9100, protocol: TCP }
          env:
            - { name: AGENT_NAME, value: "Vimes" }
            - { name: AGENT_ID, value: "vimes" }
            - { name: RUST_LOG, value: "ironclaw=info,tower_http=warn" }
            - { name: TZ, value: "America/New_York" }
            - { name: HARDSTOP_PATH, value: "/data/HARDSTOP-VIMES" }
            - { name: GATEWAY_ENABLED, value: "true" }
            - { name: GATEWAY_HOST, value: "0.0.0.0" }
            - { name: GATEWAY_PORT, value: "3000" }
            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vimes-secrets
                  key: A2A_BEARER_TOKEN
            - { name: CLI_ENABLED, value: "false" }
            - { name: LLM_BACKEND, value: "openai_compatible" }
            - { name: LLM_BASE_URL, value: "http://litellm.inference.svc.cluster.local:4000/v1" }
            - { name: LLM_MODEL, value: "chat" }
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vimes-secrets
                  key: LITELLM_API_KEY
            - { name: IRONCLAW_PERSONA_DIR, value: "/etc/ironclaw/persona" }
            # Mission deliverables are real files on the RWX graph, not the
            # Postgres-backed `memory_write` workspace. Enable the local
            # filesystem/shell tools (write_file, shell) and auto-approve them
            # so unattended mission turns can persist `world/<file>.md` without
            # an interactive approver wedging the turn.
            - { name: ALLOW_LOCAL_TOOLS, value: "true" }
            - { name: AGENT_AUTO_APPROVE_TOOLS, value: "true" }
          envFrom:
            - secretRef: { name: vimes-secrets }
          livenessProbe:
            httpGet: { path: /api/health, port: gateway }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /api/health, port: gateway }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "300m", memory: "1Gi" }
            limits:   { memory: "4Gi" }
          volumeMounts:
            - { name: state,            mountPath: /data }
            - { name: persona,          mountPath: /etc/ironclaw/persona, readOnly: true }
            - { name: ironclaw-config,  mountPath: /etc/ironclaw/openclaw.json, subPath: openclaw.json, readOnly: true }
            - { name: graph-vimes,      mountPath: /data/graphs/vimes }
            - { name: graph-frick,      mountPath: /data/graphs/frick,    readOnly: true }
            - { name: graph-frack,      mountPath: /data/graphs/frack,    readOnly: true }
            - { name: graph-sancho,     mountPath: /data/graphs/sancho,   readOnly: true }
            - { name: graph-vetinari,   mountPath: /data/graphs/vetinari, readOnly: true }
            - { name: graph-quirm,      mountPath: /data/graphs/quirm,    readOnly: true }
            - { name: graph-puck,       mountPath: /data/graphs/puck,     readOnly: true }
            - { name: graph-leo,        mountPath: /data/graphs/leo }
              # Restricted writes per HANDOFF.md §4 — runtime-enforced.
              # Vimes writes only audit findings + locked-tower flags.
      volumes:
        - { name: state,            persistentVolumeClaim: { claimName: vimes-state } }
        - { name: persona,          configMap: { name: vimes-persona } }
        - { name: ironclaw-config,  configMap: { name: vimes-ironclaw-config } }
        - { name: graph-vimes,      persistentVolumeClaim: { claimName: vimes-graph } }
        - { name: graph-frick,      persistentVolumeClaim: { claimName: frick-graph } }
        - { name: graph-frack,      persistentVolumeClaim: { claimName: frack-graph } }
        - { name: graph-sancho,     persistentVolumeClaim: { claimName: sancho-graph } }
        - { name: graph-vetinari,   persistentVolumeClaim: { claimName: vetinari-graph } }
        - { name: graph-quirm,      persistentVolumeClaim: { claimName: quirm-graph } }
        - { name: graph-puck,       persistentVolumeClaim: { claimName: puck-graph } }
        - { name: graph-leo,        persistentVolumeClaim: { claimName: leo-graph } }
      imagePullSecrets:
        - { name: forgejo-registry-credentials }
