---
# Vimes role bootstrap — replaces the imperative
# `scripts/agents/create-pg-roles.sh` step for THIS agent.
#
# Idempotent: CREATE ROLE … LOGIN / ALTER ROLE WITH PASSWORD pattern
# means re-running just rotates the password if it changed in the
# sealed Secret.
#
# The Job runs as cluster-admin (homelab-pg-app secret = postgres
# superuser) inside the `databases` namespace, so it can CREATE ROLE
# and GRANT against the cluster directly. The role's password comes
# from the per-agent SealedSecret `vimes-db-password` (same value
# that's embedded in DATABASE_URL inside agents-shared/vimes-secrets).
apiVersion: batch/v1
kind: Job
metadata:
  generateName: vimes-role-bootstrap-
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    app.kubernetes.io/name: vimes
    app.kubernetes.io/component: role-bootstrap
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vimes
        app.kubernetes.io/component: role-bootstrap
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: psql
          image: ghcr.io/cloudnative-pg/postgresql:17.5
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: homelab-pg-rw.databases.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: postgres
            - name: PGUSER
              valueFrom:
                secretKeyRef: {name: homelab-pg-app, key: username}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: {name: homelab-pg-app, key: password}
            - name: AGENT_NAME
              value: vimes
            - name: AGENT_PASSWORD
              valueFrom:
                secretKeyRef: {name: vimes-db-password, key: password}
          command: [bash, -c]
          # Server-side quoting via a session GUC + format(%L) — handles
          # passwords with any special chars (quotes, backslashes, etc.)
          # without shell-side escaping headaches.
          args:
            - |
              set -euo pipefail
              psql -v ON_ERROR_STOP=1 -X -A -t <<SQL
                SET vimes.password = '${AGENT_PASSWORD//\'/\'\'}';
                DO \$\$
                BEGIN
                  IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'vimes') THEN
                    EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L',
                                   'vimes',
                                   current_setting('vimes.password'));
                  ELSE
                    EXECUTE format('ALTER ROLE %I WITH LOGIN PASSWORD %L',
                                   'vimes',
                                   current_setting('vimes.password'));
                  END IF;
                END \$\$;
                GRANT CONNECT ON DATABASE fleet TO vimes;
              SQL
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
