apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Vimes — IronClaw audit / security agent. "The one who watches the
# watchers". Floats; soft-prefers thebeast for RAM. Lives in
# agents-shared with the rest of the fleet.

namespace: agents-shared

resources:
  - pvc.yaml
  - rbac.yaml
  - service.yaml
  - ingressroute.yaml
  - deployment.yaml

configMapGenerator:
  - name: vimes-persona
    files:
      - SOUL.md=../config/SOUL.md
      - TOOLS.md=../config/TOOLS.md
      - AGENTS.md=../shared/openclaw-configs/shared/AGENTS.md
      - HANDOFF.md=../shared/openclaw-configs/shared/HANDOFF.md
      - KILLSWITCH.md=../shared/openclaw-configs/shared/KILLSWITCH.md
      - USER.md=../shared/openclaw-configs/shared/USER.md
  - name: vimes-ironclaw-config
    files:
      - openclaw.json=../config/openclaw.json

generatorOptions:
  disableNameSuffixHash: false

commonLabels:
  app.kubernetes.io/name: vimes
  app.kubernetes.io/part-of: agents
  app.kubernetes.io/managed-by: argocd
