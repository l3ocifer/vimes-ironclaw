[package]
name = "ironclaw_tui"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Modular Ratatui-based TUI for IronClaw"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[features]
default = ["clipboard"]
clipboard = ["dep:arboard", "dep:image"]

[dependencies]
ironclaw_common = { path = "../ironclaw_common", version = "0.4.2" }
ratatui = { version = "0.30.0", features = ["crossterm"] }
tui-textarea = { version = "0.7", features = ["crossterm"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.3", features = ["sync", "macros", "rt", "time"] }
chrono = "0.4.44"
unicode-width = "0.2.2"
pulldown-cmark = { version = "0.13.3", default-features = false }
thiserror = "2.0.18"
tracing = "0.1.44"
arboard = { version = "3.6.1", optional = true }
image = { version = "0.25.10", default-features = false, features = ["png"], optional = true }

[dev-dependencies]
tokio = { version = "1.52.3", features = ["full"] }
