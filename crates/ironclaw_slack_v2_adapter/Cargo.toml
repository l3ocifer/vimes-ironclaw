[package]
name = "ironclaw_slack_v2_adapter"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Slack v2 ProductAdapter for IronClaw Reborn (#3857 tracer-bullet)"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[dependencies]
async-trait = "0.1.89"
chrono = { version = "0.4.45", features = ["serde"] }
ironclaw_product_adapters = { path = "../ironclaw_product_adapters", version = "0.1.0" }
ironclaw_turns = { path = "../ironclaw_turns", version = "0.1.0" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["time"] }

[dev-dependencies]
ironclaw_product_adapters = { path = "../ironclaw_product_adapters", version = "0.1.0", features = ["test-support", "host-auth-mint"] }
tokio = { version = "1.52.3", features = ["macros", "rt", "sync"] }
uuid = { version = "1.23.4", features = ["v4", "serde"] }
