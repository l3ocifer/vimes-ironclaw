[package]
name = "ironclaw_threads"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Canonical session thread and transcript service contracts for IronClaw Reborn"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[dependencies]
async-trait = "0.1.89"
chrono = { version = "0.4.45", features = ["serde"] }
futures = "0.3.32"
ironclaw_common = { path = "../ironclaw_common", version = "0.4.2" }
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_safety = { path = "../ironclaw_safety", version = "0.2.2" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["sync"] }
tracing = "0.1.44"
uuid = { version = "1.23.4", features = ["v4", "serde"] }

[features]
## Exposes test-only back-doors (e.g. `inject_legacy_deferred_busy_for_test`)
## needed by integration tests in a separate compilation unit. Never enable
## in production builds; this feature is intentionally off by default.
test-support = []

[dev-dependencies]
ironclaw_threads = { path = ".", features = ["test-support"] }
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread", "time"] }
