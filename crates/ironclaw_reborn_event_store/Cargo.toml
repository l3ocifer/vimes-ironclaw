[package]
name = "ironclaw_reborn_event_store"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Reborn-owned durable event and audit store backends"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[features]
default = []
postgres = [
    "dep:deadpool-postgres",
    "dep:tokio-postgres",
    "dep:tokio-postgres-rustls",
    "dep:rustls",
    "dep:rustls-native-certs",
    "dep:webpki-roots",
    "ironclaw_filesystem/postgres",
]
libsql = ["dep:libsql", "ironclaw_filesystem/libsql"]

[dependencies]
async-trait = "0.1.89"
deadpool-postgres = { version = "0.14.1", optional = true }
hex = "0.4.3"
ironclaw_events = { path = "../ironclaw_events", version = "0.1.0" }
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
libsql = { version = "0.9.30", optional = true, default-features = false, features = ["core", "replication", "remote", "tls"] }
rustls = { version = "0.23.41", optional = true, default-features = false, features = ["ring"] }
rustls-native-certs = { version = "0.8.4", optional = true }
secrecy = "0.10.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["fs", "io-util", "rt", "sync", "time"] }
tokio-postgres = { version = "0.7.18", optional = true, features = ["with-serde_json-1"] }
tokio-postgres-rustls = { version = "0.14.0", optional = true }
tracing = "0.1.44"
urlencoding = "2.1.3"
webpki-roots = { version = "0.26.11", optional = true }

[dev-dependencies]
chrono = { version = "0.4.45", features = ["serde"] }
tempfile = "3.27.0"
tokio = { version = "1.52.3", features = ["macros", "rt"] }
