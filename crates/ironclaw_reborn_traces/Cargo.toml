[package]
name = "ironclaw_reborn_traces"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
anyhow = "1.0.103"
async-trait = "0.1.89"
base64 = "0.22.1"
chrono = { version = "0.4.45", features = ["serde"] }
dirs = "6"
ed25519-dalek = { version = "2.2.0", features = ["std", "rand_core", "zeroize"] }
hex = "0.4.3"
ironclaw_common = { path = "../ironclaw_common", version = "0.4.1" }
ironclaw_llm = { path = "../ironclaw_llm", version = "0.1.0" }
ironclaw_safety = { path = "../ironclaw_safety", version = "0.2.2" }
jsonwebtoken = "9.3.1"
rand = "0.10.1"
regex = "1.12.4"
reqwest = { version = "0.13.4", default-features = false, features = ["json", "multipart", "rustls-tls-native-roots", "stream"] }
rust_decimal = { version = "1.42.1", features = ["serde", "serde-with-str", "maths"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
uuid = { version = "1.23.4", features = ["v4", "v5", "serde"] }

[dev-dependencies]
axum = { version = "0.8.9", features = ["ws"] }
tempfile = "3.27.0"
