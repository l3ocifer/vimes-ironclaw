[package]
name = "ironclaw_triggers"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Scheduled trigger domain and source-provider contracts for IronClaw Reborn"
publish = false

[features]
default = []
libsql = ["dep:libsql"]
postgres = ["dep:deadpool-postgres", "dep:tokio-postgres"]
test-support = []

[dependencies]
async-trait = "0.1.89"
chrono = { version = "0.4.45", features = ["serde"] }
chrono-tz = "0.10.4"
cron = "0.17.0"
hex = "0.4.3"
deadpool-postgres = { version = "0.14.1", optional = true }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_turns = { path = "../ironclaw_turns" }
libsql = { version = "0.9.30", optional = true, default-features = false, features = ["core", "replication", "remote", "tls"] }
tokio-postgres = { version = "0.7.18", optional = true }
serde = { version = "1.0.228", features = ["derive"] }
sha2 = "0.11.0"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["sync"] }
tracing = "0.1.44"
ulid = { version = "1.2.1", features = ["serde"] }

[dev-dependencies]
serde_json = "1.0.150"
tempfile = "3.27.0"
testcontainers-modules = { version = "0.15.0", features = ["postgres"] }
tokio = { version = "1.52.3", features = ["macros", "rt"] }
