[package]
name = "ironclaw_secrets"
version = "0.1.0"
edition = "2024"
publish = false

[features]
default = []

[dependencies]
aes-gcm = "0.10.3"
async-trait = "0.1.89"
chrono = { version = "0.4.45", features = ["serde"] }
hkdf = "0.13.0"
ironclaw_filesystem = { path = "../ironclaw_filesystem" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
rand = "0.10.1"
secrecy = "0.10.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
subtle = "2.6.1"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["macros", "rt", "sync"] }
tracing = "0.1.44"
url = "2.5.8"
uuid = { version = "1.23.4", features = ["v4", "serde"] }

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3.7.0"

[target.'cfg(target_os = "linux")'.dependencies]
secret-service = { version = "4", features = ["rt-tokio-crypto-rust"] }

[dev-dependencies]
tempfile = "3.27.0"
