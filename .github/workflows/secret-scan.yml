name: secret-scan

# Portable across GitHub Actions and Forgejo Actions.
#
# Runs the gitleaks binary directly (no SARIF / code-scanning upload),
# so it does not depend on GitHub-only endpoints. Pinned to a stable
# release; bumped via Renovate.
#
# Forgejo Actions auto-discovers workflows in `.github/workflows/`, so
# this is the single source of truth — there is no `.forgejo/workflows/`
# sibling.
#
# Scope:
#   - on push / pull_request: working-tree scan (`gitleaks dir`).
#     Catches secrets present in the current commit; matches the
#     pre-existing CI gate the homelab repo used.
#   - on schedule (weekly):  full history scan (`gitleaks detect --log-opts=--all`).
#     Catches secrets that landed historically and were later removed.

on:
  pull_request:
  push:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xz -C "$INSTALL_DIR" -f /tmp/gitleaks.tgz gitleaks
          chmod +x "$INSTALL_DIR/gitleaks"
          rm -f /tmp/gitleaks.tgz
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/gitleaks" version

      - name: Mark workspace as safe (container UID mismatch)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          git config --global --add safe.directory '*' || true

      - name: Run gitleaks (working tree)
        if: github.event_name != 'schedule'
        run: |
          set -e
          CONFIG_ARG=""
          if [ -f .gitleaks.toml ]; then
            CONFIG_ARG="--config=.gitleaks.toml"
          fi
          gitleaks dir . \
            $CONFIG_ARG \
            --redact \
            --verbose \
            --exit-code=1 \
            --report-format=json \
            --report-path=gitleaks-report.json

      - name: Run gitleaks (full history)
        if: github.event_name == 'schedule'
        run: |
          set -e
          CONFIG_ARG=""
          if [ -f .gitleaks.toml ]; then
            CONFIG_ARG="--config=.gitleaks.toml"
          fi
          gitleaks detect \
            --source=. \
            $CONFIG_ARG \
            --redact \
            --verbose \
            --exit-code=1 \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --log-opts="--all"

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30
          if-no-files-found: ignore
