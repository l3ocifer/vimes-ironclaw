name: Build & push image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "homelab/Dockerfile"
      - "homelab/image/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "build.rs"
      - "migrations/**"
      - "wit/**"
      - "skills/**"
      - "vendor/**"
  pull_request:
    paths:
      - "homelab/Dockerfile"
      - "Cargo.toml"
      - "src/**"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vimes-ironclaw
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0, submodules: false }

      - uses: docker/setup-buildx-action@v4

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            /tmp/.buildx-cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: homelab/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:homelab
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.version != '' && format('{0}:{1}', env.IMAGE, steps.tags.outputs.version) || '' }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          provenance: false
          build-args: |
            LTO=true
            CODEGEN_UNITS=1

      - if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
