[package]
name = "web-search-tool"
version = "0.2.0"
edition = "2021"
description = "Brave Web Search tool for IronClaw (WASM component)"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
wit-bindgen = "0.57.1"

[lib]
crate-type = ["cdylib"]

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1


[workspace]
