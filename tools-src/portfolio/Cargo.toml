[package]
name = "portfolio-tool"
version = "0.1.0"
edition = "2021"
description = "Cross-chain DeFi portfolio discovery, suggestions, and intent builder for IronClaw (WASM component)"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml = "0.9.34"
wit-bindgen = "0.57.1"

[lib]
crate-type = ["cdylib"]

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1

[dev-dependencies]
ureq = { version = "2.12.1", features = ["json"] }

[workspace]
