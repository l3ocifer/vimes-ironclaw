[package]
name = "telegram-tool"
version = "0.2.0"
edition = "2021"
description = "Telegram user-mode integration tool for IronClaw (WASM component)"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "=0.57.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
# Auto-derives JSON Schema from the TelegramAction tagged enum so the
# advertised schema mirrors the serde-enforced contract.
schemars = "1.2.1"
grammers-mtproto = "0.9.0"
grammers-crypto = "0.9.0"
grammers-tl-types = "0.9.0"
num-bigint = "0.4.6"
getrandom = "0.4.2"

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1

[workspace]
